<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="style.css"
</head>
<body style="background-image: url('background-image.jpg');" >

    <div class="container">
        <h2>Job Application Form</h2>
        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="abc@gmail.com" required>

            <label for="inputAddress">Address:</label>
            <input type="text" id="inputAddress" name="address" placeholder="1234 Main St" required>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" placeholder="+91" required>

            <label for="date-input" >Start Date</label>
            <input id="date-input" name="starting_date" type="date" value="2024-02-03" required>
            
            <label class="mr-4">Upload your CV:</label>
            <input type="file" name="file">

            <label for="cover-letter">Cover Letter:</label>
            <textarea id="cover-letter" name="cover-letter" rows="4" placeholder="Why should we hire you?" required></textarea>

            <button type="submit">Submit Application</button>
        </form>
    </div>

</body>
</html>
